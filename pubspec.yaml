  flutter_dotenv: ^5.1.0
  skeletonizer: ^2.0.1
  mocktail: ^1.0.4
  http_parser: ^4.1.2



dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.3.3
  commitlint_cli: ^0.8.1


