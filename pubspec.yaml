  flutter:
    sdk: flutter
  analyzer: ^6.0.0
  bloc: ^9.0.0
  bloc_test: ^10.0.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.7
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  equatable: ^2.0.7
  firebase_core: ^3.13.0
  flutter_bloc: ^9.1.0
  flutter_gemini: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.2
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.4
  flutter_settings_ui: ^3.0.1
  flutter_svg: ^2.0.17
  font_awesome_flutter: ^10.7.0
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  image_dot_indicator: ^0.0.9
